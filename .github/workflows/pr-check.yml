# NetCue - PR 合并前构建校验
#
# 触发时机：向 main 分支发起 Pull Request
# 目的：确认 PR 改动可以正常构建，作为合并门禁的 status check

name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  build-check:
    name: Build Check
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          sudo xcode-select -p
          xcodebuild -version

      - name: Build NetCue.app
        run: |
          xcodebuild build \
            -project "NetCue.xcodeproj" \
            -scheme "NetCue" \
            -configuration "Release" \
            -derivedDataPath "./build" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log

          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ 构建失败"
            exit 1
          fi

      - name: Verify build output
        run: |
          APP_PATH="./build/Build/Products/Release/NetCue.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "❌ 未找到 NetCue.app"
            exit 1
          fi
          echo "✅ 构建成功: $(du -sh $APP_PATH | cut -f1)"
